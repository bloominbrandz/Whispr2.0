<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Landing | Whispers</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap');

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }

    body, html {
        width: 100%; height: 100%;
        background: #050200;
        overflow: hidden;
        font-family: 'Shadows Into Light', cursive;
        color: white;
    }

    canvas {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    .wrapper {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 90%; max-width: 400px;
        z-index: 10;
        background: rgba(255,255,255,0.02);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 40px;
        padding: 40px;
        text-align: center;
        border: 1px solid rgba(255,69,0,0.1);
    }

    /* Logo Styling */
    .splash-logo { 
        width: 180px; 
        margin-bottom: 1rem; 
        filter: drop-shadow(0 0 15px #ffaa00); 
    }

    p { font-size: 1.2rem; opacity:0.7; }

    .btn {
        padding: 0.8rem 2rem;
        margin: 0.8rem;
        border-radius: 50px;
        font-size: 1.2rem;
        border: 1px solid rgba(255,69,0,0.5);
        background: transparent;
        color: #ff4500;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover { background: #ff4500; color:#000; box-shadow:0 0 20px rgba(255,69,0,0.5); }

</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

</head>
<body>

<canvas id="canvas"></canvas>

<div class="wrapper">
    <img src="https://i.imgur.com/7vlpCCX.png" class="splash-logo" alt="Whispers Logo">
    <p>Choose your path:</p>
    <button class="btn" onclick="location.href='login.html'">Login</button>
    <button class="btn" onclick="location.href='signup.html'">Create Account</button>
    <button class="btn" onclick="location.href='passerby.html'">Passerby</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let mouse = { x: -1000, y: -1000, active: false };
    const particleCount = 150;

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class Particle {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random()*3 + 1.5;
            this.vx = (Math.random()-0.5)*1.2;
            this.vy = (Math.random()-0.5)*1.2;
            this.opacity = Math.random()*0.5 + 0.2;
            this.angle = Math.random() * Math.PI * 2;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,69,0,${this.opacity})`;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff4500";
            ctx.fill();
        }
        update() {
            this.x += this.vx + Math.sin(this.angle)*0.3;
            this.y += this.vy + Math.cos(this.angle)*0.3;
            this.angle += 0.01;

            if(mouse.active){
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist<350){
                    let force = (350 - dist)/350;
                    this.x += (dx/dist)*force*4.5;
                    this.y += (dy/dist)*force*4.5;
                }
            }

            if(this.x < -10) this.x = canvas.width+10;
            if(this.x > canvas.width+10) this.x = -10;
            if(this.y < -10) this.y = canvas.height+10;
            if(this.y > canvas.height+10) this.y = -10;
        }
    }

    function setup(){
        particles = [];
        for(let i=0;i<particleCount;i++) particles.push(new Particle());
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p=>{p.update(); p.draw();});
        requestAnimationFrame(animate);
    }

    function handleDown(e){
        mouse.active = true;
        mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
        mouse.y = e.touches ? h[0].clientY : e.clientY;
    }
    function handleMove(e){
        mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
        mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
    }
    function handleUp(){ mouse.active = false; }

    window.addEventListener('mousedown', handleDown);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchstart', handleDown);
    window.addEventListener('touchmove', handleMove);
    window.addEventListener('touchend', handleUp);
    window.addEventListener('resize', initCanvas);

    initCanvas();
    setup();
    animate();

</script>
</body>
</html>
