<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Whispers</title>
<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
<style>
/* EMBER ALERT */
.ember-alert{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%) scale(.9);
    background:rgba(255,69,0,0.08);
    border:1px solid rgba(255,69,0,0.4);
    color:#ff4500;
    padding:12px 22px;
    border-radius:30px;
    font-size:0.95rem;
    opacity:0;
    pointer-events:none;
    box-shadow:0 0 15px rgba(255,69,0,0.4);
    transition:all .35s ease;
    z-index:9999;
}
.ember-alert.show{
    opacity:1;
    transform:translateX(-50%) scale(1);
}

body{
    margin:0;
    padding:0;
    background:#050200;
    font-family:'Shadows Into Light',cursive;
    color:white;
}

/* RETURN BUTTON */
.return-top{
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 1000;
}

#returnBtn{
    padding:6px 18px;
    border-radius:25px;
    border:1px solid rgba(255,69,0,0.5);
    background:transparent;
    color:#ff4500;
    cursor:pointer;
    font-size:0.95rem;
}
#returnBtn:hover{
    background:#ff4500;
    color:black;
    box-shadow:0 0 15px rgba(255,69,0,0.5);
}

/* PAGE CONTAINER */
.page{
    max-width:820px;
    margin:auto;
    padding:70px 20px;
}

/* PROFILE HEADER */
.profile-box{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,69,0,0.25);
    border-radius:25px;
    padding:18px 22px;
    margin-bottom:20px;
}

.profile-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.profile-left{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#ff4500;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:1.2rem;
}

.username{
    font-size:1.25rem;
}

/* BIO */
.profile-bio{
    font-family:'Quicksand',sans-serif;
    font-size:0.95rem;
    color:rgba(255,255,255,0.7);
    line-height:1.4;
    margin-top:10px;
    font-style:italic;
    max-width:400px;
}

/* PROFILE RIGHT */
.profile-right{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
}

.edit-btn{
    padding:6px 16px;
    border-radius:30px;
    border:1px solid rgba(255,69,0,0.5);
    background:transparent;
    color:#ff4500;
    cursor:pointer;
    font-size:0.95rem;
}
.edit-btn:hover{
    background:#ff4500;
    color:black;
    box-shadow:0 0 12px rgba(255,69,0,0.5);
}

/* TOGGLE SWITCH */
.toggle-switch{
    position:relative;
    display:inline-block;
    width:50px;
    height:24px;
}
.toggle-switch input{
    opacity:0;
    width:0;
    height:0;
}
.toggle-switch .slider{
    position:absolute;
    cursor:pointer;
    top:0; left:0; right:0; bottom:0;
    background-color: rgba(255,69,0,0.2);
    transition:0.4s;
    border-radius:24px;
}
.toggle-switch .slider::before{
    position:absolute;
    content:"";
    height:18px;
    width:18px;
    left:3px;
    bottom:3px;
    background-color:#ff4500;
    transition:0.4s;
    border-radius:50%;
}
.toggle-switch input:checked + .slider{
    background-color: rgba(255,69,0,0.5);
}
.toggle-switch input:checked + .slider::before{
    transform:translateX(26px);
}

.switch{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:0.85rem;
}

/* STATS ROW */
.stats-row{
    display:flex;
    gap:15px;
    margin-bottom:30px;
}
.stat-box{
    flex:1;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,69,0,0.3);
    border-radius:15px;
    padding:15px;
    text-align:center;
    transition:all 0.3s ease;
    cursor:pointer;
}
.stat-box:hover{
    background:rgba(255,69,0,0.1);
    transform:translateY(-2px);
}
.stat-num{
    font-size:1.5rem;
    color:#ff4500;
    font-weight:bold;
    display:block;
}
.stat-label{
    font-family:'Quicksand',sans-serif;
    font-size:0.7rem;
    color:rgba(255,255,255,0.5);
    margin-top:5px;
}

/* WHISPERS */
.whispers-container{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,69,0,0.25);
    border-radius:22px;
    padding:20px;
}

.section-title{
    margin-bottom:15px;
    font-size:1.15rem;
}

.whisper-box{
    position:relative;
    background:rgba(255,69,0,0.05);
    border:2px solid rgba(255,69,0,0.25);
    border-radius:18px;
    padding:16px 16px 16px 24px;
    margin-bottom:16px;
    box-shadow:0 0 10px rgba(255,69,0,0.15);
    transition:.25s;
}

.whisper-box:hover{
    box-shadow:0 0 18px rgba(255,69,0,0.35);
}

.whisper-box::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:4px;
    background:#ff4500;
    border-radius:18px 0 0 18px;
}

.main-whisper{
    background:rgba(255,69,0,0.08);
    border:2px solid rgba(255,69,0,0.45);
    border-radius:12px;
    padding:10px 14px;
    font-size:1.1rem;
    margin-bottom:10px;
}

/* INTERACTIVE REACTIONS - CLICKABLE */
.reactions{
    display:flex;
    gap:12px;
    font-family:'Quicksand',sans-serif;
    font-size:0.9rem;
    margin-bottom:12px;
    flex-wrap:wrap;
}

.reaction-btn{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,69,0,0.3);
    border-radius:15px;
    padding:6px 12px;
    cursor:pointer;
    transition:all 0.3s ease;
    display:flex;
    align-items:center;
    gap:5px;
    color:#ffca99;
    user-select:none;
}

.reaction-btn:hover{
    background:rgba(255,69,0,0.15);
    transform:scale(1.1);
    border-color:#ff4500;
}

.reaction-btn.active{
    background:rgba(255,69,0,0.3);
    border-color:#ff4500;
    box-shadow:0 0 10px rgba(255,69,0,0.5);
}

.reaction-count{
    font-weight:bold;
    color:#fff;
    min-width:20px;
    text-align:center;
}

/* COMMENTS SECTION */
.comments-section{
    border-top:1px solid rgba(255,69,0,0.2);
    padding-top:12px;
    margin-top:8px;
}

.comments-title{
    font-family:'Quicksand',sans-serif;
    font-size:0.75rem;
    color:rgba(255,255,255,0.5);
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.comment-item{
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    padding:8px 12px;
    margin-bottom:6px;
    border-left:2px solid rgba(255,69,0,0.3);
}

.comment-author{
    font-family:'Quicksand',sans-serif;
    font-size:0.75rem;
    color:#ffaa00;
    margin-bottom:2px;
}

.comment-text{
    font-family:'Quicksand',sans-serif;
    font-size:0.85rem;
    color:rgba(255,255,255,0.9);
    line-height:1.3;
}

.no-comments{
    font-family:'Quicksand',sans-serif;
    font-size:0.8rem;
    color:rgba(255,255,255,0.4);
    font-style:italic;
    padding:8px 0;
}

.view-all-comments{
    font-family:'Quicksand',sans-serif;
    font-size:0.75rem;
    color:rgba(255,69,0,0.7);
    cursor:pointer;
    text-align:center;
    margin-top:8px;
    transition:all 0.3s;
}

.view-all-comments:hover{
    color:#ff4500;
}

/* LOADING */
.loading{
    text-align:center;
    padding:40px;
    color:rgba(255,255,255,0.5);
    font-family:'Quicksand',sans-serif;
}

/* EMPTY STATE */
.empty-state{
    text-align:center;
    padding:40px;
    opacity:0.5;
}
.empty-icon{
    font-size:3rem;
    margin-bottom:15px;
}
.empty-text{
    font-family:'Quicksand',sans-serif;
    font-size:1rem;
}

/* Followers Modal */
#followersModal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    z-index:1000;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
}
.modal-content{
    background:rgba(10,5,2,0.95);
    border:1px solid rgba(255,69,0,0.3);
    border-radius:20px;
    padding:25px;
    max-width:400px;
    width:100%;
    max-height:70vh;
    overflow-y:auto;
}
.modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    padding-bottom:15px;
    border-bottom:1px solid rgba(255,69,0,0.3);
}
.modal-title{
    font-size:1.3rem;
    color:#ffca99;
}
.modal-close{
    background:none;
    border:none;
    color:#ffca99;
    font-size:1.5rem;
    cursor:pointer;
    padding:5px;
}
.follower-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    transition:all 0.3s;
}
.follower-item:hover{
    background:rgba(255,69,0,0.1);
}
.follower-avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:rgba(255,69,0,0.3);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.2rem;
}
.follower-name{
    font-family:'Quicksand',sans-serif;
    color:#ffca99;
}
</style>
</head>
<body>

<div id="emberAlert" class="ember-alert"></div>

<div class="return-top">
    <button id="returnBtn">← Return</button>
</div>

<div class="page">
    <div class="profile-box">
        <div class="profile-header">
            <div class="profile-left">
                <div class="avatar" id="avatarLetter">?</div>
                <div class="username" id="usernameDisplay">Loading...</div>
                <div class="profile-bio" id="bioDisplay">This whisperer keeps their secrets close...</div>
            </div>
            <div class="profile-right">
                <button class="edit-btn" onclick="window.location.href='edit-profile.html'">Edit Profile</button>
                <div class="switch">
                    <span style="font-size:.9rem;">Hide whispers to others</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="hideWhispers">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row" id="statsRow">
        <div class="stat-box" onclick="showFollowersModal('followers')">
            <span class="stat-num" id="statFollowers">0</span>
            <div class="stat-label">Followers</div>
        </div>
        <div class="stat-box" onclick="showFollowersModal('following')">
            <span class="stat-num" id="statFollowing">0</span>
            <div class="stat-label">Following</div>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="statWhispers">0</span>
            <div class="stat-label">Whispers</div>
        </div>
    </div>

    <div class="whispers-container" id="whispersContainer">
        <div class="section-title">My Whispers</div>
        <div class="loading" id="loadingMsg">Summoning your whispers from the void...</div>
    </div>
</div>

<!-- Followers Modal -->
<div id="followersModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="followersModalTitle">Followers</div>
            <button class="modal-close" onclick="closeFollowersModal()">×</button>
        </div>
        <div id="followersList"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, query, where, onSnapshot, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyBSmm2lC7iAMmQJqsG_jXi4DWpL7ghcJnc",
    authDomain: "whispr-92fc0.firebaseapp.com",
    projectId: "whispr-92fc0",
    storageBucket: "whispr-92fc0.firebasestorage.app",
    messagingSenderId: "133594748424",
    appId: "1:133594748424:web:7dc7ff44e105d2d5cee3bd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Store unsubscribe functions to clean up listeners
const listeners = new Map(); // whisperId -> {whisperUnsub, commentsUnsub}
let followUnsubscribe = null;

// Top alert
function showAlert(message) {
    const alertBox = document.getElementById("emberAlert");
    alertBox.textContent = message;
    alertBox.classList.add("show");
    setTimeout(()=>alertBox.classList.remove("show"), 2500);
}

// Count reactions by type from the reactions object {userId: emoji, ...}
function countReactions(reactions) {
    if (!reactions) return { "❤️": 0, "🔥": 0, "✨": 0, "🌙": 0 };
    
    const counts = { "❤️": 0, "🔥": 0, "✨": 0, "🌙": 0 };
    Object.values(reactions).forEach(reaction => {
        if (counts.hasOwnProperty(reaction)) {
            counts[reaction]++;
        }
    });
    return counts;
}

// Get user's current reaction from reactions object
function getUserReaction(reactions, userId) {
    if (!reactions || !userId) return null;
    return reactions[userId] || null;
}

// Toggle reaction on a whisper - ONE PER USER LOGIC
async function toggleReaction(whisperId, reactionType) {
    const user = auth.currentUser;
    if (!user) {
        showAlert("You must be logged in to react");
        return;
    }

    try {
        const whisperRef = doc(db, "whispers", whisperId);
        const whisperSnap = await getDoc(whisperRef);
        
        if (!whisperSnap.exists()) return;
        
        const data = whisperSnap.data();
        const reactions = data.reactions || {};
        const currentReaction = reactions[user.uid];
        
        let updates = {};
        
        if (currentReaction === reactionType) {
            // User clicked same reaction -> REMOVE it (toggle off)
            updates[`reactions.${user.uid}`] = null;
        } else {
            // User clicked different reaction -> REPLACE old one (only one allowed)
            updates[`reactions.${user.uid}`] = reactionType;
        }
        
        await updateDoc(whisperRef, updates);
        
    } catch (e) {
        console.error("Reaction error:", e);
        showAlert("Failed to react");
    }
}

// Expose toggleReaction to window
window.toggleReaction = toggleReaction;

// Create HTML for a whisper box with LIVE updates
function createWhisperBox(whisperId, data, currentUserId) {
    const box = document.createElement("div");
    box.classList.add("whisper-box");
    box.id = `whisper-${whisperId}`;

    const messageText = data.message || data.text || "No message";
    const dear = data.dear || "Someone";
    const from = data.from || "Anonymous";
    
    // Get initial counts and user reaction
    const reactionCounts = countReactions(data.reactions);
    const userReaction = getUserReaction(data.reactions, currentUserId);

    box.innerHTML = `
        <div style="font-family:'Quicksand',sans-serif;font-size:0.7rem;color:#ffaa00;margin-bottom:6px;">dear ${escapeHtml(dear)}</div>
        <div class="main-whisper">${escapeHtml(messageText)}</div>
        <div style="font-family:'Quicksand',sans-serif;font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:10px;">from ${escapeHtml(from)}</div>
        
        <!-- LIVE REACTION BUTTONS -->
        <div class="reactions" id="reactions-${whisperId}">
            <button class="reaction-btn ${userReaction === '❤️' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '❤️')">
                <span>❤️</span>
                <span class="reaction-count" id="count-${whisperId}-❤️">${reactionCounts["❤️"]}</span>
            </button>
            <button class="reaction-btn ${userReaction === '🔥' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '🔥')">
                <span>🔥</span>
                <span class="reaction-count" id="count-${whisperId}-🔥">${reactionCounts["🔥"]}</span>
            </button>
            <button class="reaction-btn ${userReaction === '✨' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '✨')">
                <span>✨</span>
                <span class="reaction-count" id="count-${whisperId}-✨">${reactionCounts["✨"]}</span>
            </button>
            <button class="reaction-btn ${userReaction === '🌙' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '🌙')">
                <span>🌙</span>
                <span class="reaction-count" id="count-${whisperId}-🌙">${reactionCounts["🌙"]}</span>
            </button>
        </div>
        
        <div class="comments-section" id="comments-${whisperId}">
            <div class="comments-title">💬 Comments</div>
            <div class="comments-list" id="comments-list-${whisperId}">
                <div class="no-comments">Loading echoes...</div>
            </div>
        </div>
    `;
    
    return box;
}

// Update reaction UI live
function updateReactionUI(whisperId, reactions, currentUserId) {
    const counts = countReactions(reactions);
    const userReaction = getUserReaction(reactions, currentUserId);
    
    // Update counts
    document.getElementById(`count-${whisperId}-❤️`).textContent = counts["❤️"];
    document.getElementById(`count-${whisperId}-🔥`).textContent = counts["🔥"];
    document.getElementById(`count-${whisperId}-✨`).textContent = counts["✨"];
    document.getElementById(`count-${whisperId}-🌙`).textContent = counts["🌙"];
    
    // Update active states
    const buttons = document.querySelectorAll(`#reactions-${whisperId} .reaction-btn`);
    const types = ['❤️', '🔥', '✨', '🌙'];
    
    buttons.forEach((btn, index) => {
        if (types[index] === userReaction) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
}

// Setup live listener for a whisper (reactions + data)
function setupWhisperListener(whisperId, currentUserId) {
    if (listeners.has(whisperId)) {
        if (listeners.get(whisperId).whisperUnsub) listeners.get(whisperId).whisperUnsub();
        if (listeners.get(whisperId).commentsUnsub) listeners.get(whisperId).commentsUnsub();
    }

    const whisperRef = doc(db, "whispers", whisperId);
    
    // Listen for whisper data changes (reactions)
    const whisperUnsub = onSnapshot(whisperRef, (docSnap) => {
        if (!docSnap.exists()) return;
        const data = docSnap.data();
        updateReactionUI(whisperId, data.reactions, currentUserId);
    }, (error) => {
        console.error("Whisper listener error:", error);
    });

    // Listen for comments
    const commentsRef = collection(db, "whispers", whisperId, "comments");
    const commentsQuery = query(commentsRef, orderBy("timestamp", "desc"), limit(3));
    
    const commentsUnsub = onSnapshot(commentsQuery, (snapshot) => {
        const commentsList = document.getElementById(`comments-list-${whisperId}`);
        if (!commentsList) return;

        if (snapshot.empty) {
            commentsList.innerHTML = '<div class="no-comments">No echoes yet...</div>';
            return;
        }

        commentsList.innerHTML = '';
        snapshot.forEach(doc => {
            const comment = doc.data();
            const commentEl = document.createElement('div');
            commentEl.className = 'comment-item';
            
            const time = comment.timestamp ? new Date(comment.timestamp.toDate()).toLocaleDateString() : '';
            commentEl.innerHTML = `
                <div class="comment-author">${escapeHtml(comment.from || 'Anonymous')} ${time ? `• ${time}` : ''}</div>
                <div class="comment-text">${escapeHtml(comment.text)}</div>
            `;
            commentsList.appendChild(commentEl);
        });

        if (snapshot.size >= 3) {
            const viewAll = document.createElement('div');
            viewAll.className = 'view-all-comments';
            viewAll.textContent = 'View all comments →';
            commentsList.appendChild(viewAll);
        }
    }, (error) => {
        console.error("Comments listener error:", error);
    });

    listeners.set(whisperId, { whisperUnsub, commentsUnsub });
}

// Setup live followers listener
function setupFollowersListener(userId) {
    if (followUnsubscribe) followUnsubscribe();

    const userRef = doc(db, "users", userId);
    followUnsubscribe = onSnapshot(userRef, (docSnap) => {
        if (!docSnap.exists()) return;
        const data = docSnap.data();
        
        // Count followers (users who have this user in their following list)
        updateFollowersCount(userId);
        
        // Count following
        const following = data.following || [];
        document.getElementById('statFollowing').textContent = following.length;
    });
}

async function updateFollowersCount(userId) {
    try {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("following", "array-contains", userId));
        const snapshot = await getDocs(q);
        document.getElementById('statFollowers').textContent = snapshot.size;
    } catch (e) {
        console.error("Error counting followers:", e);
    }
}

// Show followers/following modal
window.showFollowersModal = async function(type) {
    const modal = document.getElementById('followersModal');
    const title = document.getElementById('followersModalTitle');
    const list = document.getElementById('followersList');
    const user = auth.currentUser;
    
    if (!user) return;
    
    title.textContent = type === 'followers' ? 'Followers' : 'Following';
    list.innerHTML = '<div class="loading">Loading...</div>';
    modal.style.display = 'flex';

    try {
        if (type === 'following') {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const following = userDoc.data().following || [];
            
            if (following.length === 0) {
                list.innerHTML = '<div class="empty-state">Not following anyone yet</div>';
                return;
            }

            list.innerHTML = '';
            for (const uid of following) {
                const followerDoc = await getDoc(doc(db, "users", uid));
                if (followerDoc.exists()) {
                    const data = followerDoc.data();
                    const name = data.username || data.displayName || 'Anonymous';
                    addFollowerToList(list, uid, name);
                }
            }
        } else {
            // Followers - query all users where following contains current user
            const q = query(collection(db, "users"), where("following", "array-contains", user.uid));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) {
                list.innerHTML = '<div class="empty-state">No followers yet</div>';
                return;
            }

            list.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const name = data.username || data.displayName || 'Anonymous';
                addFollowerToList(list, doc.id, name);
            });
        }
    } catch (e) {
        console.error(e);
        list.innerHTML = '<div class="empty-state">Error loading</div>';
    }
};

function addFollowerToList(list, uid, name) {
    const item = document.createElement('div');
    item.className = 'follower-item';
    item.onclick = () => window.location.href = `other.html?uid=${uid}`;
    item.innerHTML = `
        <div class="follower-avatar">${name.charAt(0).toUpperCase()}</div>
        <div class="follower-name">${escapeHtml(name)}</div>
    `;
    list.appendChild(item);
}

window.closeFollowersModal = function() {
    document.getElementById('followersModal').style.display = 'none';
};

// Close modal on outside click
document.getElementById('followersModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeFollowersModal();
});

// Load user info & whispers
onAuthStateChanged(auth, async (user)=>{
    if(!user){ window.location.href="login.html"; return; }

    const docRef = doc(db,"users",user.uid);
    const docSnap = await getDoc(docRef);
    const username = docSnap.exists() ? docSnap.data().username : user.displayName || "Anonymous";
    const bio = docSnap.exists() ? docSnap.data().bio : '';
    
    document.getElementById("usernameDisplay").textContent = username;
    document.getElementById("avatarLetter").textContent = username.charAt(0).toUpperCase();
    document.getElementById("bioDisplay").textContent = bio || "This whisperer keeps their secrets close...";

    const hideSwitch = document.getElementById('hideWhispers');
    hideSwitch.checked = docSnap.exists() && docSnap.data().hideWhispers;

    // Setup live followers listener
    setupFollowersListener(user.uid);

    // Load whispers - try by uid first, fallback to username
    try {
        const whispersRef = collection(db,"whispers");
        
        // Get recent whispers and filter client-side (more reliable)
        const q = query(whispersRef, orderBy("timestamp", "desc"), limit(50));
        const snapshot = await getDocs(q);
        
        document.getElementById("loadingMsg").style.display = "none";
        
        const container = document.getElementById("whispersContainer");
        container.innerHTML = '<div class="section-title">My Whispers</div>';
        
        let foundCount = 0;
        
        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const whisperId = docSnap.id;
            
            // Check if this whisper belongs to current user
            const whisperUid = data.uid || data.userId;
            const whisperFrom = data.from || "";
            
            const isMatch = (whisperUid === user.uid) || (whisperFrom === username);
            
            if (isMatch) {
                foundCount++;
                const box = createWhisperBox(whisperId, data, user.uid);
                container.appendChild(box);
                setupWhisperListener(whisperId, user.uid);
            }
        });
        
        // Update whispers count
        document.getElementById('statWhispers').textContent = foundCount;
        
        if (foundCount === 0) {
            container.innerHTML += `
                <div class="empty-state">
                    <div class="empty-icon">🍃</div>
                    <div class="empty-text">No whispers found. Release one from the main page!</div>
                </div>
            `;
        }
        
    } catch (error) {
        console.error("Error loading whispers:", error);
        document.getElementById("whispersContainer").innerHTML += `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <div class="empty-text">Error loading whispers</div>
            </div>
        `;
    }

    hideSwitch.addEventListener('change', async (e)=>{
        await updateDoc(doc(db,"users",user.uid),{ hideWhispers: e.target.checked });
        showAlert(e.target.checked ? "Whispers hidden from others" : "Whispers visible to others");
    });
});

// Escape HTML to prevent XSS
function escapeHtml(text) {
    if(!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Return button
document.getElementById("returnBtn").addEventListener("click",()=>{
    window.location.href="enter.html";
});
</script>
