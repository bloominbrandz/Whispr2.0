<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages | Whispers</title>
<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { background: #050200; color: white; font-family: 'Shadows Into Light', cursive; margin: 0; display: flex; flex-direction: column; height: 100vh; }

/* Header Styling */
.header { 
  padding: 20px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  border-bottom: 1px solid rgba(255,69,0,0.2); 
  background: rgba(255,69,0,0.05); 
}
.header h2 { margin: 0; color: #ff4500; flex: 1; text-align: center; }

/* Unified Button Style */
.navBtn {
  background: transparent;
  border: 1px solid #ff4500;
  color: #ff4500;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-family: inherit;
  font-weight: bold;
  transition: all 0.3s ease;
  font-size: 0.9rem;
}
.navBtn:hover {
  background: rgba(255, 69, 0, 0.1);
  box-shadow: 0 0 10px rgba(255, 69, 0, 0.3);
  transform: scale(1.05);
}

/* Search box & results */
.searchBox { padding: 15px 20px; display: flex; gap: 10px; }
input { flex: 1; padding: 12px 15px; border-radius: 25px; border: 1px solid rgba(255,69,0,0.3); background: rgba(255,255,255,0.05); color: white; outline: none; font-family: inherit; font-size: 14px; }
input:focus { border-color: #ff4500; background: rgba(255,255,255,0.08); }
.results { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
.chatItem { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.3s ease; }
.chatItem:hover { background: rgba(255,69,0,0.1); transform: translateX(5px); }
.avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,69,0,0.3); }
.chatInfo { flex: 1; }
.username { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
.lastMessage { font-size: 12px; color: rgba(255,255,255,0.6); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.unread { font-size: 12px; background: #ff4500; padding: 2px 6px; border-radius: 10px; color: white; margin-left: 5px; }
.emptyState { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="header">
  <button class="navBtn" onclick="window.location.href='enter.html'">< Back</button>
  <h2>Messages</h2>
  <button class="navBtn" onclick="window.location.href='search.html'">+ Find</button>
</div>

<div class="searchBox">
  <input type="text" id="searchInput" placeholder="Search conversations..."/>
</div>

<div class="results" id="results">
  <div class="emptyState">No conversations yet</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBSmm2lC7iAMmQJqsG_jXi4DWpL7ghcJnc",
  authDomain: "whispr-92fc0.firebaseapp.com",
  projectId: "whispr-92fc0",
  storageBucket: "whispr-92fc0.firebasestorage.app",
  messagingSenderId: "133594748424",
  appId: "1:133594748424:web:7dc7ff44e105d2d5cee3bd",
  measurementId: "G-P7RG5XGGB1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const resultsDiv = document.getElementById("results");
const searchInput = document.getElementById("searchInput");

// Auth check
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  loadConversations(user.uid);
});

async function loadConversations(uid){
  const userChatsDoc = doc(db, "userChats", uid);
  
  onSnapshot(userChatsDoc, async docSnap => {
    const data = docSnap.data();
    resultsDiv.innerHTML = "";
    if(!data || Object.keys(data).length === 0){
      resultsDiv.innerHTML = '<div class="emptyState">No conversations yet</div>';
      return;
    }
    const chats = Object.values(data);
    chats.sort((a,b) => (b.lastMessageTime?.seconds || 0) - (a.lastMessageTime?.seconds || 0));

    for(const chat of chats){
      // Ensure username is correct by fetching from users collection if missing
      if(!chat.otherUsername){
        try {
          const userDoc = await getDoc(doc(db,"users",chat.otherUserId));
          if(userDoc.exists()){
            chat.otherUsername = userDoc.data().username || "Anonymous";
          } else {
            chat.otherUsername = "Anonymous";
          }
        } catch(err){ chat.otherUsername = "Anonymous"; }
      }

      const div = document.createElement("div");
      div.className = "chatItem";
      div.innerHTML = `
        <img class="avatar" src="${chat.otherAvatarUrl || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(chat.otherUsername) + '&background=ff4500&color=fff'}">
        <div class="chatInfo">
          <div class="username">${chat.otherUsername} ${chat.unreadCount > 0 ? '<span class="unread">'+chat.unreadCount+'</span>' : ''}</div>
          <div class="lastMessage">${chat.lastMessageText || ""}</div>
        </div>
      `;
      div.onclick = () => window.location.href = `chat.html?uid=${chat.otherUserId}&name=${encodeURIComponent(chat.otherUsername)}`;
      resultsDiv.appendChild(div);
    }
  });
}

// Search filter
searchInput.addEventListener("input", () => {
  const filter = searchInput.value.toLowerCase();
  Array.from(resultsDiv.children).forEach(item => {
    if(!item.classList.contains("chatItem")) return;
    const name = item.querySelector(".username").textContent.toLowerCase();
    item.style.display = name.includes(filter) ? "flex" : "none";
  });
});
</script>

</body>
</html>
