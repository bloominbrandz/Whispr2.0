<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers | Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; background: #050200; font-family: 'Shadows Into Light', cursive; color: #ffca99; overflow-x: hidden; }

/* Header */
.header { position: fixed; top: 0; left: 0; right: 0; background: rgba(5, 2, 0, 0.95); border-bottom: 1px solid rgba(255, 69, 0, 0.3); padding: 15px 20px; z-index: 100; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
.back-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 69, 0, 0.3); color: #ffca99; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; transition: all 0.3s ease; }
.back-btn:hover { background: rgba(255, 69, 0, 0.15); border-color: #ff4500; color: #fff; }
.page-title { font-size: 1.3rem; color: #ff4500; }

/* Profile Container */
.container { max-width: 600px; margin: 0 auto; padding: 80px 20px 40px; }

/* Profile Card */
.profile-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 69, 0, 0.3); border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; position: relative; overflow: hidden; }
.profile-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #ff4500, transparent); }
.profile-avatar { width: 100px; height: 100px; background: rgba(255, 69, 0, 0.2); border: 2px solid rgba(255, 69, 0, 0.5); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: 0 0 30px rgba(255, 69, 0, 0.3); }
.profile-name { font-size: 1.8rem; color: #ffca99; margin-bottom: 5px; word-break: break-word; }
.profile-username { font-family: 'Quicksand', sans-serif; font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 15px; }
.profile-bio { font-family: 'Quicksand', sans-serif; font-size: 0.95rem; color: rgba(255, 255, 255, 0.7); line-height: 1.5; font-style: italic; max-width: 400px; margin: 0 auto 20px; }

/* Action Buttons */
.action-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.action-btn { background: #ff4500; border: none; color: #000; padding: 10px 25px; border-radius: 25px; font-family: 'Shadows Into Light', cursive; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 5px; text-decoration: none; }
.action-btn:hover { background: #ff6347; transform: scale(1.05); box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4); }
.action-btn.secondary { background: transparent; border: 2px solid #ff4500; color: #ff4500; }
.action-btn.secondary:hover { background: rgba(255, 69, 0, 0.1); }
.action-btn.following { background: rgba(255, 69, 0, 0.3); border-color: #ff4500; }

/* Own Profile Badge */
.own-badge { display: inline-block; background: rgba(255, 69, 0, 0.2); border: 1px solid rgba(255, 69, 0, 0.5); color: #ffca99; padding: 3px 10px; border-radius: 15px; font-family: 'Quicksand', sans-serif; font-size: 0.7rem; margin-left: 10px; vertical-align: middle; }

/* Stats Row */
.stats-row { display: flex; gap: 15px; margin-bottom: 30px; }
.stat-box { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 69, 0, 0.3); border-radius: 15px; padding: 15px; text-align: center; transition: all 0.3s ease; cursor: pointer; }
.stat-box:hover { background: rgba(255, 69, 0, 0.1); transform: translateY(-2px); }
.stat-num { font-size: 1.5rem; color: #ff4500; font-weight: bold; display: block; }
.stat-label { font-family: 'Quicksand', sans-serif; font-size: 0.7rem; color: rgba(255, 255, 255, 0.5); margin-top: 5px; }

/* Section Headers */
.section-title { font-size: 1.3rem; color: #ffca99; margin: 30px 0 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255, 69, 0, 0.3); display: flex; align-items: center; gap: 10px; }

/* Whisper Cards - SAME AS PROFILE */
.whisper-list { display: flex; flex-direction: column; gap: 15px; }
.whisper-box { position: relative; background: rgba(255, 69, 0, 0.05); border: 2px solid rgba(255, 69, 0, 0.25); border-radius: 18px; padding: 16px 16px 16px 24px; margin-bottom: 16px; box-shadow: 0 0 10px rgba(255, 69, 0, 0.15); transition: .25s; }
.whisper-box:hover { box-shadow: 0 0 18px rgba(255, 69, 0, 0.35); }
.whisper-box::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: #ff4500; border-radius: 18px 0 0 18px; }
.whisper-dear { font-family: 'Quicksand', sans-serif; font-size: 0.7rem; color: #ffaa00; margin-bottom: 6px; }
.main-whisper { background: rgba(255, 69, 0, 0.08); border: 2px solid rgba(255, 69, 0, 0.45); border-radius: 12px; padding: 10px 14px; font-size: 1.1rem; margin-bottom: 10px; color: #fff; }
.whisper-from { font-family: 'Quicksand', sans-serif; font-size: 0.7rem; color: rgba(255, 255, 255, 0.4); margin-bottom: 10px; }

/* INTERACTIVE REACTIONS */
.reactions { display: flex; gap: 12px; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; margin-bottom: 12px; flex-wrap: wrap; }
.reaction-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 69, 0, 0.3); border-radius: 15px; padding: 6px 12px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 5px; color: #ffca99; user-select: none; }
.reaction-btn:hover { background: rgba(255, 69, 0, 0.15); transform: scale(1.1); border-color: #ff4500; }
.reaction-btn.active { background: rgba(255, 69, 0, 0.3); border-color: #ff4500; box-shadow: 0 0 10px rgba(255, 69, 0, 0.5); }
.reaction-count { font-weight: bold; color: #fff; min-width: 20px; text-align: center; }

/* COMMENTS SECTION WITH INPUT */
.comments-section { border-top: 1px solid rgba(255, 69, 0, 0.2); padding-top: 12px; margin-top: 8px; }
.comments-title { font-family: 'Quicksand', sans-serif; font-size: 0.75rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.comment-item { background: rgba(255, 255, 255, 0.03); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; border-left: 2px solid rgba(255, 69, 0, 0.3); }
.comment-author { font-family: 'Quicksand', sans-serif; font-size: 0.75rem; color: #ffaa00; margin-bottom: 2px; cursor: pointer; display: inline-block; transition: all 0.3s; }
.comment-author:hover { color: #ff4500; text-decoration: underline; transform: translateX(3px); }
.comment-text { font-family: 'Quicksand', sans-serif; font-size: 0.85rem; color: rgba(255, 255, 255, 0.9); line-height: 1.3; }
.no-comments { font-family: 'Quicksand', sans-serif; font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); font-style: italic; padding: 8px 0; }

/* COMMENT INPUT */
.comment-input-area { display: flex; gap: 8px; margin-top: 10px; }
.comment-input { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 69, 0, 0.3); border-radius: 20px; padding: 8px 15px; color: #fff; font-family: 'Quicksand', sans-serif; outline: none; font-size: 0.85rem; }
.comment-input::placeholder { color: rgba(255, 255, 255, 0.4); }
.comment-submit { background: #ff4500; border: none; border-radius: 20px; padding: 8px 16px; color: #000; font-weight: bold; cursor: pointer; font-family: 'Shadows Into Light'; transition: all 0.3s; font-size: 0.9rem; }
.comment-submit:hover { background: #ff6347; transform: scale(1.05); }
.comment-submit:disabled { background: #666; cursor: not-allowed; transform: none; }

/* Empty State */
.empty-state { text-align: center; padding: 60px 20px; opacity: 0.5; }
.empty-icon { font-size: 3rem; margin-bottom: 20px; }
.empty-text { font-family: 'Quicksand', sans-serif; font-size: 1rem; }

/* Loading */
.loading { text-align: center; padding: 40px; color: rgba(255, 255, 255, 0.5); font-family: 'Quicksand', sans-serif; }

/* Hidden Whispers Message */
.hidden-whispers { text-align: center; padding: 60px 20px; opacity: 0.7; }
.hidden-whispers-icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.5; }
.hidden-whispers-text { font-family: 'Quicksand', sans-serif; font-size: 1rem; font-style: italic; color: rgba(255, 255, 255, 0.6); }

/* Followers Modal */
#followersModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: rgba(10, 5, 2, 0.95); border: 1px solid rgba(255, 69, 0, 0.3); border-radius: 20px; padding: 25px; max-width: 400px; width: 100%; max-height: 70vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255, 69, 0, 0.3); }
.modal-title { font-size: 1.3rem; color: #ffca99; }
.modal-close { background: none; border: none; color: #ffca99; font-size: 1.5rem; cursor: pointer; padding: 5px; }
.follower-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
.follower-item:hover { background: rgba(255, 69, 0, 0.1); }
.follower-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 69, 0, 0.3); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
.follower-name { font-family: 'Quicksand', sans-serif; color: #ffca99; }

</style>
<base target="_blank">
</head>
<body>
<div class="header">
    <button class="back-btn" onclick="window.history.back()">← Back</button>
    <div class="page-title">Profile</div>
    <div style="width: 80px;"></div>
</div>
<div class="container">
    <!-- Profile Card -->
    <div class="profile-card" id="profileCard">
        <div class="loading">Summoning profile from the void...</div>
    </div>
    
    <!-- Stats -->
    <div class="stats-row" id="statsRow" style="display: none;">
        <div class="stat-box" onclick="showFollowersModal('followers')">
            <span class="stat-num" id="statFollowers">0</span>
            <div class="stat-label">Followers</div>
        </div>
        <div class="stat-box" onclick="showFollowersModal('following')">
            <span class="stat-num" id="statFollowing">0</span>
            <div class="stat-label">Following</div>
        </div>
        <div class="stat-box">
            <span class="stat-num" id="statWhispers">0</span>
            <div class="stat-label">Whispers</div>
        </div>
    </div>

    <!-- Whispers Section -->
    <div class="section-title">📜 Whispers</div>
    <div class="whisper-list" id="whisperList">
        <div class="loading">Gathering whispers...</div>
    </div>
</div>

<!-- Followers Modal -->
<div id="followersModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="followersModalTitle">Followers</div>
            <button class="modal-close" onclick="closeFollowersModal()">×</button>
        </div>
        <div id="followersList"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, addDoc, query, where, orderBy, limit, onSnapshot, arrayUnion, arrayRemove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBSmm2lC7iAMmQJqsG_jXi4DWpL7ghcJnc",
    authDomain: "whispr-92fc0.firebaseapp.com",
    projectId: "whispr-92fc0",
    storageBucket: "whispr-92fc0.firebasestorage.app",
    messagingSenderId: "133594748424",
    appId: "1:133594748424:web:7dc7ff44e105d2d5cee3bd"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let profileUserId = null;
let profileUserData = null;
let isOwnProfile = false;
let listeners = new Map();
let followUnsubscribe = null;

// Get UID from URL
function getUidFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('uid');
}

// Count reactions
function countReactions(reactions) {
    if (!reactions) return { "❤️": 0, "🔥": 0, "✨": 0, "🌙": 0 };
    const counts = { "❤️": 0, "🔥": 0, "✨": 0, "🌙": 0 };
    Object.values(reactions).forEach(reaction => {
        if (counts.hasOwnProperty(reaction)) counts[reaction]++;
    });
    return counts;
}

function getUserReaction(reactions, userId) {
    if (!reactions || !userId) return null;
    return reactions[userId] || null;
}

// Toggle reaction - ONE PER USER
async function toggleReaction(whisperId, reactionType) {
    if (!currentUser) {
        alert('Please log in to react');
        return;
    }

    try {
        const whisperRef = doc(db, "whispers", whisperId);
        const whisperSnap = await getDoc(whisperRef);
        if (!whisperSnap.exists()) return;

        const data = whisperSnap.data();
        const reactions = data.reactions || {};
        const currentReaction = reactions[currentUser.uid];

        let updates = {};
        if (currentReaction === reactionType) {
            updates[`reactions.${currentUser.uid}`] = null;
        } else {
            updates[`reactions.${currentUser.uid}`] = reactionType;
        }

        await updateDoc(whisperRef, updates);
    } catch (e) {
        console.error("Reaction error:", e);
    }
}
window.toggleReaction = toggleReaction;

// Submit comment
async function submitComment(whisperId) {
    if (!currentUser) {
        alert('Please log in to comment');
        return;
    }

    const input = document.getElementById(`comment-input-${whisperId}`);
    const btn = document.getElementById(`comment-btn-${whisperId}`);
    const text = input.value.trim();
    
    if (!text) return;

    btn.disabled = true;
    
    try {
        const userDoc = await getDoc(doc(db, "users", currentUser.uid));
        const username = userDoc.exists() ? (userDoc.data().username || currentUser.displayName) : (currentUser.displayName || "Anonymous");
        
        await addDoc(collection(db, "whispers", whisperId, "comments"), {
            text: text,
            from: username,
            uid: currentUser.uid,
            timestamp: serverTimestamp()
        });
        
        input.value = '';
    } catch (e) {
        console.error("Comment error:", e);
        alert('Failed to add comment');
    } finally {
        btn.disabled = false;
    }
}
window.submitComment = submitComment;

// Create whisper box WITH COMMENT INPUT
function createWhisperBox(whisperId, data, currentUserId) {
    const box = document.createElement("div");
    box.classList.add("whisper-box");
    box.id = `whisper-${whisperId}`;

    const messageText = data.message || data.text || "No message";
    const dear = data.dear || "Someone";
    const from = data.from || "Anonymous";
    const reactionCounts = countReactions(data.reactions);
    const userReaction = getUserReaction(data.reactions, currentUserId);

    box.innerHTML = `
        <div class="whisper-dear">dear ${escapeHtml(dear)}</div>
        <div class="main-whisper">${escapeHtml(messageText)}</div>
        <div class="whisper-from">from ${escapeHtml(from)}</div>
        
        <div class="reactions" id="reactions-${whisperId}">
            <button class="reaction-btn ${userReaction === '❤️' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '❤️')">
                <span>❤️</span>
                <span class="reaction-count" id="count-${whisperId}-❤️">${reactionCounts["❤️"]}</span>
            </button>
            <button class="reaction-btn ${userReaction === '🔥' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '🔥')">
                <span>🔥</span>
                <span class="reaction-count" id="count-${whisperId}-🔥">${reactionCounts["🔥"]}</span>
            </button>
            <button class="reaction-btn ${userReaction === '✨' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '✨')">
                <span>✨</span>
                <span class="reaction-count" id="count-${whisperId}-✨">${reactionCounts["✨"]}</span>
            </button>
            <button class="reaction-btn ${userReaction === '🌙' ? 'active' : ''}" onclick="toggleReaction('${whisperId}', '🌙')">
                <span>🌙</span>
                <span class="reaction-count" id="count-${whisperId}-🌙">${reactionCounts["🌙"]}</span>
            </button>
        </div>
        
        <div class="comments-section" id="comments-${whisperId}">
            <div class="comments-title">💬 Comments</div>
            <div class="comments-list" id="comments-list-${whisperId}">
                <div class="no-comments">Loading echoes...</div>
            </div>
            <div class="comment-input-area">
                <input type="text" id="comment-input-${whisperId}" class="comment-input" placeholder="Add your echo..." maxlength="200" onkeypress="if(event.key==='Enter') submitComment('${whisperId}')">
                <button id="comment-btn-${whisperId}" class="comment-submit" onclick="submitComment('${whisperId}')">Send</button>
            </div>
        </div>
    `;

    return box;
}

function updateReactionUI(whisperId, reactions, currentUserId) {
    const counts = countReactions(reactions);
    const userReaction = getUserReaction(reactions, currentUserId);

    ['❤️', '🔥', '✨', '🌙'].forEach(type => {
        const el = document.getElementById(`count-${whisperId}-${type}`);
        if (el) el.textContent = counts[type];
    });

    const buttons = document.querySelectorAll(`#reactions-${whisperId} .reaction-btn`);
    const types = ['❤️', '🔥', '✨', '🌙'];
    
    buttons.forEach((btn, index) => {
        if (types[index] === userReaction) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
}

function setupWhisperListener(whisperId, currentUserId) {
    if (listeners.has(whisperId)) {
        const subs = listeners.get(whisperId);
        if (subs.whisperUnsub) subs.whisperUnsub();
        if (subs.commentsUnsub) subs.commentsUnsub();
    }

    const whisperRef = doc(db, "whispers", whisperId);
    const whisperUnsub = onSnapshot(whisperRef, (docSnap) => {
        if (!docSnap.exists()) return;
        const data = docSnap.data();
        updateReactionUI(whisperId, data.reactions, currentUserId);
    });

    const commentsRef = collection(db, "whispers", whisperId, "comments");
    const commentsQuery = query(commentsRef, orderBy("timestamp", "desc"), limit(5));
    
    const commentsUnsub = onSnapshot(commentsQuery, (snapshot) => {
        const commentsList = document.getElementById(`comments-list-${whisperId}`);
        if (!commentsList) return;

        if (snapshot.empty) {
            commentsList.innerHTML = '<div class="no-comments">No echoes yet... Be the first!</div>';
            return;
        }

        commentsList.innerHTML = '';
        snapshot.forEach(doc => {
            const comment = doc.data();
            const commentEl = document.createElement('div');
            commentEl.className = 'comment-item';
            
            const time = comment.timestamp ? new Date(comment.timestamp.toDate()).toLocaleDateString() : '';
            const safeUid = escapeHtml(comment.uid || '');
            const safeName = escapeHtml(comment.from || 'Anonymous');
            
            commentEl.innerHTML = `
                <div class="comment-author" onclick="window.location.href='other.html?uid=${safeUid}'">${safeName} ${time ? `• ${time}` : ''}</div>
                <div class="comment-text">${escapeHtml(comment.text)}</div>
            `;
            commentsList.appendChild(commentEl);
        });
    });

    listeners.set(whisperId, { whisperUnsub, commentsUnsub });
}

// Setup live followers count
function setupFollowersListener(userId) {
    if (followUnsubscribe) followUnsubscribe();

    const userRef = doc(db, "users", userId);
    followUnsubscribe = onSnapshot(userRef, (docSnap) => {
        if (!docSnap.exists()) return;
        const data = docSnap.data();
        
        // Count followers (users who have this user in their following list)
        updateFollowersCount(userId);
        
        // Count following
        const following = data.following || [];
        document.getElementById('statFollowing').textContent = following.length;
    });
}

async function updateFollowersCount(userId) {
    try {
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("following", "array-contains", userId));
        const snapshot = await getDocs(q);
        document.getElementById('statFollowers').textContent = snapshot.size;
    } catch (e) {
        console.error("Error counting followers:", e);
    }
}

// Show followers/following modal
window.showFollowersModal = async function(type) {
    const modal = document.getElementById('followersModal');
    const title = document.getElementById('followersModalTitle');
    const list = document.getElementById('followersList');
    
    title.textContent = type === 'followers' ? 'Followers' : 'Following';
    list.innerHTML = '<div class="loading">Loading...</div>';
    modal.style.display = 'flex';

    try {
        if (type === 'following') {
            const userDoc = await getDoc(doc(db, "users", profileUserId));
            const following = userDoc.data().following || [];
            
            if (following.length === 0) {
                list.innerHTML = '<div class="empty-state">Not following anyone yet</div>';
                return;
            }

            list.innerHTML = '';
            for (const uid of following) {
                const followerDoc = await getDoc(doc(db, "users", uid));
                if (followerDoc.exists()) {
                    const data = followerDoc.data();
                    const name = data.username || data.displayName || 'Anonymous';
                    addFollowerToList(list, uid, name);
                }
            }
        } else {
            // Followers - query all users where following contains profileUserId
            const q = query(collection(db, "users"), where("following", "array-contains", profileUserId));
            const snapshot = await getDocs(q);
            
            if (snapshot.empty) {
                list.innerHTML = '<div class="empty-state">No followers yet</div>';
                return;
            }

            list.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                const name = data.username || data.displayName || 'Anonymous';
                addFollowerToList(list, doc.id, name);
            });
        }
    } catch (e) {
        console.error(e);
        list.innerHTML = '<div class="empty-state">Error loading</div>';
    }
};

function addFollowerToList(list, uid, name) {
    const item = document.createElement('div');
    item.className = 'follower-item';
    item.onclick = () => window.location.href = `other.html?uid=${uid}`;
    item.innerHTML = `
        <div class="follower-avatar">${name.charAt(0).toUpperCase()}</div>
        <div class="follower-name">${escapeHtml(name)}</div>
    `;
    list.appendChild(item);
}

window.closeFollowersModal = function() {
    document.getElementById('followersModal').style.display = 'none';
};

// Load profile
async function loadProfile() {
    profileUserId = getUidFromUrl();
    if (!profileUserId) {
        document.getElementById('profileCard').innerHTML = '<div class="empty-state"><div class="empty-icon">🌙</div><div class="empty-text">No user specified</div></div>';
        return;
    }

    try {
        const userDoc = await getDoc(doc(db, "users", profileUserId));
        if (!userDoc.exists()) {
            document.getElementById('profileCard').innerHTML = '<div class="empty-state"><div class="empty-icon">🌙</div><div class="empty-text">This whisperer has vanished into the void...</div></div>';
            return;
        }

        profileUserData = userDoc.data();
        const displayName = profileUserData.username || profileUserData.displayName || 'Anonymous';
        const bio = profileUserData.bio || 'This whisperer keeps their secrets close...';
        isOwnProfile = currentUser && currentUser.uid === profileUserId;

        // Check if current user is following
        let isFollowing = false;
        if (currentUser) {
            const currentUserDoc = await getDoc(doc(db, "users", currentUser.uid));
            const following = currentUserDoc.data().following || [];
            isFollowing = following.includes(profileUserId);
        }

        // Build action buttons - FIXED MESSAGE BUTTON WITH ACTUAL NAME
        let actionButtonsHtml = '';
        if (!isOwnProfile) {
            actionButtonsHtml = `
                <div class="action-buttons">
                    <a href="chat.html?uid=${profileUserId}&name=${encodeURIComponent(displayName)}" class="action-btn">
                        ✉️ Message
                    </a>
                    <button class="action-btn secondary ${isFollowing ? 'following' : ''}" id="followBtn" onclick="toggleFollow()">
                        ${isFollowing ? 'Following' : 'Follow'}
                    </button>
                </div>
            `;
        }

        const profileHtml = `
            <div class="profile-avatar">${displayName.charAt(0).toUpperCase()}</div>
            <div class="profile-name">
                ${escapeHtml(displayName)}
                ${isOwnProfile ? '<span class="own-badge">YOU</span>' : ''}
            </div>
            <div class="profile-username">@${escapeHtml(displayName.toLowerCase().replace(/\s+/g, '_'))}</div>
            <div class="profile-bio">"${escapeHtml(bio)}"</div>
            ${actionButtonsHtml}
        `;
        
        document.getElementById('profileCard').innerHTML = profileHtml;
        document.getElementById('statsRow').style.display = 'flex';

        // Setup live followers listener
        setupFollowersListener(profileUserId);

        // Check if whispers are hidden
        const whispersHidden = !isOwnProfile && profileUserData.hideWhispers === true;
        
        if (whispersHidden) {
            document.getElementById('whisperList').innerHTML = `
                <div class="hidden-whispers">
                    <div class="hidden-whispers-icon">🔒</div>
                    <div class="hidden-whispers-text">This whisperer has chosen to keep their whispers private...</div>
                </div>
            `;
            document.getElementById('statWhispers').textContent = '0';
        } else {
            await loadUserWhispers(profileUserId);
        }

    } catch (e) {
        console.error('Error loading profile:', e);
        document.getElementById('profileCard').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Failed to load profile</div></div>';
    }
}

// Load user whispers
async function loadUserWhispers(uid) {
    try {
        const whispersRef = collection(db, "whispers");
        const q = query(whispersRef, orderBy("timestamp", "desc"), limit(50));
        const snapshot = await getDocs(q);
        
        document.getElementById('whisperList').innerHTML = '';
        
        let foundCount = 0;
        
        const container = document.getElementById('whisperList');
        const currentUserId = currentUser ? currentUser.uid : null;

        snapshot.forEach(docSnap => {
            const data = docSnap.data();
            const whisperId = docSnap.id;
            
            const whisperUid = data.uid || data.userId;
            const whisperFrom = data.from || "";
            const profileName = profileUserData.username || profileUserData.displayName;
            
            const isMatch = (whisperUid === uid) || (whisperFrom === profileName);
            
            if (isMatch) {
                foundCount++;
                const box = createWhisperBox(whisperId, data, currentUserId);
                container.appendChild(box);
                setupWhisperListener(whisperId, currentUserId);
            }
        });

        document.getElementById('statWhispers').textContent = foundCount;

        if (foundCount === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🍃</div>
                    <div class="empty-text">No whispers found in the void...</div>
                </div>
            `;
        }

    } catch (e) {
        console.error("Error loading whispers:", e);
        document.getElementById('whisperList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <div class="empty-text">Failed to load whispers</div>
            </div>
        `;
    }
}

// Toggle follow - LIVE UPDATE
window.toggleFollow = async function() {
    if (!currentUser) {
        alert('Please log in to follow');
        return;
    }

    const btn = document.getElementById('followBtn');
    const isFollowing = btn.classList.contains('following');

    try {
        const currentUserRef = doc(db, "users", currentUser.uid);
        if (isFollowing) {
            await updateDoc(currentUserRef, { following: arrayRemove(profileUserId) });
            btn.textContent = 'Follow';
            btn.classList.remove('following');
        } else {
            await updateDoc(currentUserRef, { following: arrayUnion(profileUserId) });
            btn.textContent = 'Following';
            btn.classList.add('following');
        }
        // Count will update automatically via listener
    } catch (e) {
        console.error('Follow error:', e);
    }
};

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Close modals on outside click
document.getElementById('followersModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeFollowersModal();
});

// Auth check
onAuthStateChanged(auth, user => {
    currentUser = user;
    loadProfile();
});
</script>
